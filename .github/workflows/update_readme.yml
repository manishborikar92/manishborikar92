name: Update Dynamic README

on:
  # Run daily at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Also run on every push to main (so edits to README template take effect)
  push:
    branches: [main]
    paths:
      - "README.md"
      - "update_readme.py"

permissions:
  contents: write

jobs:
  # ── Job 1: Regenerate dynamic README sections ─────────────────────────────
  update-readme:
    name: Refresh projects & skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run updater script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_readme.py

      - name: Commit & push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update README [skip ci]"
          git push

  # ── Job 2: Regenerate contribution snake ──────────────────────────────────
  generate-snake:
    name: Refresh contribution snake
    runs-on: ubuntu-latest
    # Run snake job in parallel with readme job
    needs: []

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
